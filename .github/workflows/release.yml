name: Release

# Tag a commit `vX.Y.Z` to cut a release. Velopack packages a self-contained Windows installer
# and delta packages and publishes them to GitHub Releases, which is the update feed installed
# clients poll from "Check for updates".
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 0.1.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF_NAME -like 'v*') { $env:GITHUB_REF_NAME.TrimStart('v') } else { '${{ github.event.inputs.version }}' }
          "version=$v" >> $env:GITHUB_OUTPUT
          # Canonical tag used for the GitHub Release, consistent whether triggered by a tag push
          # (ref_name already "vX.Y.Z") or a manual run (only the bare version is supplied).
          "tag=v$v" >> $env:GITHUB_OUTPUT
          # A semver pre-release suffix (e.g. 1.3.0-beta.1, 1.3.0-rc.1) marks a patrons-first build:
          # it's published as a GitHub *pre-release*, so only Beta-channel (supporter) clients pick it up.
          # Promote to everyone later by cutting a normal vX.Y.Z release.
          $preFlag = if ($v -match '-') { '--pre' } else { '' }
          "prerelease=$(if ($v -match '-') { 'true' } else { 'false' })" >> $env:GITHUB_OUTPUT
          "preFlag=$preFlag" >> $env:GITHUB_OUTPUT

      - name: Restore & test
        run: dotnet test Lodestone.slnx --configuration Release

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish src/Lodestone.App/Lodestone.App.csproj
          --configuration Release -r win-x64 --self-contained true
          -o publish /p:Version=${{ steps.ver.outputs.version }}

      - name: Install Velopack CLI
        # Pin vpk to the same version as the Velopack library (Directory.Packages.props) to avoid
        # CLI/runtime drift in the packaged update metadata.
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Package with Velopack
        run: >
          vpk pack
          --packId Lodestone
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish
          --mainExe Lodestone.exe
          --packTitle "Lodestone Mod Manager"
          --packAuthors "Mateusz Podeszwa"
          --icon src/Lodestone.App/Assets/lodestone.ico
          --splashImage src/Lodestone.App/Assets/installer-splash.png
          --splashProgressColor "#5AC26D"
          --shortcuts "Desktop,StartMenuRoot"
        # Code signing (optional): add --signParams once a certificate is configured via secrets,
        # e.g. --signParams "/td sha256 /fd sha256 /tr http://timestamp.digicert.com /f cert.pfx /p $env:VPK_SIGN_PASSWORD".

      - name: Publish release to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # `--pre` (set only for pre-release versions) marks the GitHub Release as a pre-release, which is
        # exactly what the app's Beta channel (GithubSource prerelease:true) and the website's
        # /api/download/beta look for. Stable clients never see it.
        run: >
          vpk upload github
          --repoUrl https://github.com/MateuszPodeszwa/LodestoneModManager
          --publish
          ${{ steps.ver.outputs.preFlag }}
          --releaseName "Lodestone ${{ steps.ver.outputs.version }}"
          --tag ${{ steps.ver.outputs.tag }}
          --token $env:GITHUB_TOKEN
